root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/asset-core ./cmd/server"
bin = "./tmp/asset-core"
include_ext = ["go"]
exclude_dir = ["tmp", "vendor"]
exclude_regex = ["_test.go"]
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = "2s"

[log]
time = true

[screen]
clear_on_rebuild = false
keep_scroll = true
