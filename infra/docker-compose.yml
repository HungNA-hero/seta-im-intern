name: seta-dam

services:
  asset-db:
    image: postgres:16-alpine
    container_name: seta-asset-db
    environment:
      POSTGRES_DB: ${ASSET_DB_NAME:-asset_db}
      POSTGRES_USER: ${ASSET_DB_USER:-asset_user}
      POSTGRES_PASSWORD: ${ASSET_DB_PASSWORD:-asset_password}
    ports:
      - "${ASSET_DB_PORT:-5433}:5432"
    volumes:
      - asset_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  access-db:
    image: postgres:16-alpine
    container_name: seta-access-db
    environment:
      POSTGRES_DB: ${ACCESS_DB_NAME:-access_db}
      POSTGRES_USER: ${ACCESS_DB_USER:-access_user}
      POSTGRES_PASSWORD: ${ACCESS_DB_PASSWORD:-access_password}
    ports:
      - "${ACCESS_DB_PORT:-5434}:5432"
    volumes:
      - access_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  flyway-asset:
    image: flyway/flyway:10-alpine
    profiles: ["migration"]
    depends_on:
      asset-db:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://asset-db:5432/${ASSET_DB_NAME:-asset_db}
      FLYWAY_USER: ${ASSET_DB_USER:-asset_user}
      FLYWAY_PASSWORD: ${ASSET_DB_PASSWORD:-asset_password}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      # Concurrent KAN-58 index creation needs a session-level Flyway lock.
      FLYWAY_POSTGRESQL_TRANSACTIONAL_LOCK: "false"
    volumes:
      - ./db/asset/migrations:/flyway/sql:ro
    command: -connectRetries=60 migrate

  flyway-access:
    image: flyway/flyway:10-alpine
    profiles: ["migration"]
    depends_on:
      access-db:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://access-db:5432/${ACCESS_DB_NAME:-access_db}
      FLYWAY_USER: ${ACCESS_DB_USER:-access_user}
      FLYWAY_PASSWORD: ${ACCESS_DB_PASSWORD:-access_password}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    volumes:
      - ./db/access/migrations:/flyway/sql:ro
    command: -connectRetries=60 migrate

  access-core:
    build:
      context: ../services/access-core
      target: prod
    container_name: seta-access-core
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      ACCESS_DB_HOST: access-db
      ACCESS_DB_PORT: 5432
      ACCESS_DB_NAME: ${ACCESS_DB_NAME:-access_db}
      ACCESS_DB_USER: ${ACCESS_DB_USER:-access_user}
      ACCESS_DB_PASSWORD: ${ACCESS_DB_PASSWORD:-access_password}
      GO_ASSET_URL: http://asset-core:8080
      ASSET_INTERNAL_API_TOKEN: ${ASSET_INTERNAL_API_TOKEN:-seta-dam-local-development-token}
    ports:
      - "${NODE_ACCESS_CORE_PORT:-4000}:4000"
    depends_on:
      access-db:
        condition: service_healthy
      asset-core:
        condition: service_healthy
    stop_grace_period: 15s

  asset-core:
    build:
      context: ../services/asset-core
      target: prod
    container_name: seta-asset-core
    environment:
      PORT: 8080
      ASSET_DB_HOST: asset-db
      ASSET_DB_PORT: 5432
      ASSET_DB_NAME: ${ASSET_DB_NAME:-asset_db}
      ASSET_DB_USER: ${ASSET_DB_USER:-asset_user}
      ASSET_DB_PASSWORD: ${ASSET_DB_PASSWORD:-asset_password}
      ASSET_DB_SSLMODE: disable
      ASSET_INTERNAL_API_TOKEN: ${ASSET_INTERNAL_API_TOKEN:-seta-dam-local-development-token}
    ports:
      - "${GO_ASSET_CORE_PORT:-8080}:8080"
    depends_on:
      asset-db:
        condition: service_healthy
    stop_grace_period: 15s

  asset-delete-worker:
    build:
      context: ../services/asset-core
      target: prod
    container_name: seta-asset-delete-worker
    entrypoint: ["/app/asset-delete-worker"]
    environment:
      ASSET_DB_HOST: asset-db
      ASSET_DB_PORT: 5432
      ASSET_DB_NAME: ${ASSET_DB_NAME:-asset_db}
      ASSET_DB_USER: ${ASSET_DB_USER:-asset_user}
      ASSET_DB_PASSWORD: ${ASSET_DB_PASSWORD:-asset_password}
      ASSET_DB_SSLMODE: disable
    depends_on:
      asset-db:
        condition: service_healthy
    stop_grace_period: 15s

  redis:
    image: redis:7-alpine
    container_name: seta-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: seta-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: seta-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"

volumes:
  asset_db_data:
  access_db_data:
  redis_data:
